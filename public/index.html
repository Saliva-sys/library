<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knižnica - SunSoft</title>
    <!-- Tu spájame náš web s Bootstrapom cez internet -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <!-- Hlavný nadpis aplikácie -->
        <div class="p-5 mb-4 bg-dark text-white rounded-3 shadow">
            <h1 class="display-5 fw-bold">📚 Systém Knižnica pre SunSoft</h1>
            <p class="col-md-8 fs-4 text-secondary">Interná evidencia kníh, čitateľov a výpožičiek.</p>
        </div>

        <div class="row g-4">
            <!-- 1. SEKCE: KNIHY -->
            <div class="col-md-6">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-primary text-white fw-bold">📖 Správa kníh</div>
                    <div class="card-body">
                        <form class="mb-4">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Názov knihy</label>
                                <input type="text" class="form-control" placeholder="Napr. Kód neznámy" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Autor</label>
                                <input type="text" class="form-control" placeholder="Napr. Ján Kustra" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">➕ Pridať novú knihu</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 2. SEKCE: ČITATELIA -->
            <div class="col-md-6">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-success text-white fw-bold">👥 Správa čitateľov</div>
                    <div class="card-body">
                        <p class="text-muted">Tu bude evidencia občianskych preukazov a mien.</p>
                    </div>
                </div>
            </div>

            <!-- 3. SEKCE: VÝPOŽIČKY (Na celú šírku dole) -->
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white fw-bold">🔄 Výpožičný systém a vrátenia</div>
                    <div class="card-body">
                        <p class="text-muted">Tu budú roletové menu na prepojenie čitateľa s knihou.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JavaScript pre pokročilé funkcie (napr. dropdowny) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
